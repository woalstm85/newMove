<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bgGradient)"/>
  
  <!-- Truck Animation Path -->
  <path id="truckPath" d="M-200 960 Q540 960 1280 960" fill="none" stroke="none"/>
  
  <!-- Truck -->
  <g id="truck">
    <path d="M100 800 
             L300 800 
             C350 800, 400 750, 400 700 
             V500 
             C400 450, 450 400, 500 400 
             H800 
             V300 
             C800 250, 750 200, 700 200 
             H500 
             V100 
             C500 50, 450 0, 400 0 
             H100 
             C50 0, 0 50, 0 100 
             V700 
             C0 750, 50 800, 100 800" 
          fill="#3498DB"/>
    
    <!-- Wheels -->
    <circle cx="250" cy="800" r="80" fill="#2980B9"/>
    <circle cx="650" cy="800" r="80" fill="#2980B9"/>
    
    <!-- Windows -->
    <rect x="550" y="200" width="100" height="80" rx="10" fill="#ECF0F1"/>
    <rect x="250" y="200" width="100" height="80" rx="10" fill="#ECF0F1"/>
    
    <!-- Moving Boxes -->
    <rect x="850" y="500" width="120" height="80" fill="#ECF0F1" rx="10"/>
    <rect x="850" y="600" width="120" height="80" fill="#BDC3C7" rx="10"/>
  </g>
  
  <!-- Truck Animation -->
  <animateMotion 
    xlink:href="#truck"
    dur="3s"
    repeatCount="indefinite"
    rotate="auto">
    <mpath xlink:href="#truckPath"/>
  </animateMotion>
  
  <!-- App Name -->
  <text x="540" y="1600" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="120" 
        font-weight="bold" 
        fill="#FFFFFF">
    MoveSmart
  </text>
  
  <!-- Tagline -->
  <text x="540" y="1700" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="50" 
        fill="#BDC3C7">
    Your Moving Companion
  </text>
</svg>
